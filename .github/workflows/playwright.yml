name: Playwright Tests

on: [push]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/* # 【修正】node-size から node-version に修正

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      # 【修正】シンプルなコマンドに戻しました。失敗しても自動で次のステップに進みます。
      run: npx playwright test --reporter=json > test-result.json

    - name: Upload Test Result
      uses: actions/upload-artifact@v4
      if: always() # テストが成功しても失敗しても、必ずJSONをアップロードする
      with:
        name: playwright-report
        path: test-result.json
        retention-days: 1