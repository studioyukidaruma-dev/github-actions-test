name: Playwright Tests

on: [push] # すべてのプッシュで実行。AIエージェントが専用ブランチにプッシュした時もトリガーされます。

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-size: lts/*

    - name: Install dependencies
      run: npm ci # package.jsonに基づいて依存関係をインストール

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps # Playwrightに必要なブラウザをインストール

    - name: Run Playwright tests
      # テストが失敗しても、後続のArtifact保存を実行するために、continue-on-error: trueにする。
      # ただし、gh run watch --exit-statusで失敗を検知できるよう、このステップ自体は失敗として終わらせる。
      run: |
        npx playwright test --reporter=json > test-result.json || (mv test-result.json tmp-test-result.json && mv tmp-test-result.json test-result.json && exit 1)

    - name: Upload Test Result
      uses: actions/upload-artifact@v4
      if: always() # テストが成功しても失敗しても必ず実行
      with:
        name: playwright-report
        path: test-result.json
        retention-days: 1 # 1日だけ保存（すぐに消す）